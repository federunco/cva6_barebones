package:
  name: cva6_barebones
  authors: ["Federico Runco (federico.runco@gmail.com)"]

dependencies:
  cva6: { git: "https://github.com/openhwgroup/cva6.git", rev: "master" }
  register_interface: { git: "https://github.com/pulp-platform/register_interface.git", version: "=0.4.1" }  
  axi: { git: "https://github.com/pulp-platform/axi.git", version: 0.31.1 }

sources:
  - hw/sram.sv
  - hw/vendor/axi2mem.sv

  - hw/uart/inc/uart_pkg.sv
  - hw/uart/reg/uart_reg_pkg.sv
  - hw/uart/reg/uart_reg_top.sv
  - hw/uart/baud_gen.sv
  - hw/uart/uart_rx.sv
  - hw/uart/uart_tx.sv
  - hw/uart/uart_top.sv

  - hw/bootrom.sv

  - hw/include/cva6_barebones_pkg.sv
  - hw/cva6_barebones.sv

  - target: soc_verilate
    files:
      - verif/sim_uart.sv
      - verif/tb_boot.sv